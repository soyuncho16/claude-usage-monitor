name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Run core + frontend metadata tests
        run: python3 -m unittest discover -s tests -v

  gnome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Lint GNOME extension.js
        working-directory: frontends/gnome
        run: |
          npm ci
          npm run lint

  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Build the menu bar app bundle
        working-directory: frontends/macos
        run: |
          pip install -r requirements.txt
          python setup.py py2app
      - name: Smoke-check the bundle (executable runs, bundled imports resolve)
        working-directory: frontends/macos
        run: |
          APP="dist/Claude Usage Monitor.app"
          test -d "$APP"
          EXE=$(plutil -extract CFBundleExecutable raw "$APP/Contents/Info.plist")
          "$APP/Contents/MacOS/$EXE" --check

  windows-core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Test the Core library (net8.0 — runs on Linux)
        working-directory: frontends/windows
        run: dotnet test tests/ClaudeUsage.Tests -c Release

  windows-tray-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build the WinForms tray (net8.0-windows)
        working-directory: frontends/windows
        run: dotnet build src/ClaudeUsage.Tray -c Release
